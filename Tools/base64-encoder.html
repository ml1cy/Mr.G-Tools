<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder - Mr.G Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .back-btn { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-bottom: 20px; border: 1px solid white; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .tool-card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 500; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Courier New', monospace; resize: vertical; }
        .tool-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background 0.3s; margin-top: 8px; }
        .tool-button:hover { background: #764ba2; }
        .tool-output { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 15px; border-left: 4px solid #667eea; word-break: break-all; font-family: 'Courier New', monospace; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← Back to Tools</a>
        <header>
            <h1>🔤 Base64 Encoder/Decoder</h1>
            <p>Encode and decode Base64 strings</p>
        </header>
        
        <div class="tool-card">
            <h2>Base64 Encoder/Decoder</h2>
            <label>Text or Base64:</label>
            <textarea id="base64Input" placeholder="Enter text or Base64..." rows="6"></textarea>
            <div class="button-group">
                <button class="tool-button" onclick="encodeBase64()">Encode to Base64</button>
                <button class="tool-button" onclick="decodeBase64()">Decode from Base64</button>
            </div>
            <div id="base64Output"></div>
        </div>
    </div>

    <script>
        function encodeBase64() {
            const input = document.getElementById('base64Input').value;
            const output = btoa(unescape(encodeURIComponent(input)));
            displayOutput('base64Output', output);
        }

        function decodeBase64() {
            try {
                const input = document.getElementById('base64Input').value;
                const output = decodeURIComponent(escape(atob(input)));
                displayOutput('base64Output', output);
            } catch (e) {
                displayOutput('base64Output', '<div style="color: #ff4444;">Invalid Base64</div>');
            }
        }

        function displayOutput(elementId, content) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="tool-output">${content}</div>`;
        }
    </script>
</body>
</html>
