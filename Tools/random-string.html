<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random String Generator - Mr.G Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .back-btn { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-bottom: 20px; border: 1px solid white; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .tool-card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Courier New', monospace; }
        .tool-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background 0.3s; margin-top: 15px; }
        .tool-button:hover { background: #764ba2; }
        .tool-output { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 15px; border-left: 4px solid #667eea; word-break: break-all; font-family: 'Courier New', monospace; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← Back to Tools</a>
        <header>
            <h1>🎲 Random String Generator</h1>
            <p>Generate random strings with various charsets</p>
        </header>
        
        <div class="tool-card">
            <h2>Random String Generator</h2>
            <label>Length:</label>
            <input type="number" id="randomLength" value="32" min="1">
            <label>Character Set:</label>
            <select id="randomCharset">
                <option value="alphanumeric">Alphanumeric (a-z, A-Z, 0-9)</option>
                <option value="numeric">Numeric (0-9)</option>
                <option value="lowercase">Lowercase (a-z)</option>
                <option value="uppercase">Uppercase (A-Z)</option>
                <option value="hex">Hexadecimal (0-9, a-f)</option>
                <option value="special">Special Characters</option>
            </select>
            <button class="tool-button" onclick="generateRandomString()">Generate</button>
            <div id="randomOutput"></div>
        </div>
    </div>

    <script>
        function generateRandomString() {
            const length = parseInt(document.getElementById('randomLength').value);
            const charset = document.getElementById('randomCharset').value;
            const output = document.getElementById('randomOutput');

            let chars;
            switch(charset) {
                case 'numeric': chars = '0123456789'; break;
                case 'lowercase': chars = 'abcdefghijklmnopqrstuvwxyz'; break;
                case 'uppercase': chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; break;
                case 'hex': chars = '0123456789abcdef'; break;
                case 'special': chars = '!@#$%^&*()_+-=[]{}|;:,.<>?'; break;
                default: chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            }

            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            displayOutput('randomOutput', result);
        }

        function displayOutput(elementId, content) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="tool-output">${content}</div>`;
        }
    </script>
</body>
</html>
