<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Names - Mr.G Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .back-btn { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-bottom: 20px; border: 1px solid white; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .tool-card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .wheel-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #wheelCanvas { border: 3px solid #667eea; border-radius: 50%; box-shadow: 0 8px 16px rgba(0,0,0,0.2); cursor: pointer; }
        .wheel-controls { width: 100%; max-width: 400px; }
        .name-input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .name-input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; }
        .name-input-group button { padding: 10px 15px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .name-input-group button:hover { background: #764ba2; }
        .names-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .name-tag { background: #667eea; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.9em; display: flex; align-items: center; gap: 6px; }
        .remove-name { cursor: pointer; font-weight: bold; padding: 0 4px; }
        .remove-name:hover { color: #ffcccc; }
        .tool-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background 0.3s; margin-bottom: 8px; }
        .tool-button:hover { background: #764ba2; }
        .clear-btn { background: #ff6b6b !important; }
        .clear-btn:hover { background: #ff5252 !important; }
        .tool-output { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 15px; border-left: 4px solid #667eea; text-align: center; font-size: 1.1em; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← Back to Tools</a>
        <header>
            <h1>🎡 Wheel of Names</h1>
            <p>Randomly select names from a spinning wheel</p>
        </header>
        
        <div class="tool-card">
            <h2>Wheel of Names</h2>
            <div class="wheel-container">
                <canvas id="wheelCanvas" width="300" height="300"></canvas>
                <div class="wheel-controls">
                    <div class="name-input-group">
                        <input type="text" id="nameInput" placeholder="Enter a name...">
                        <button onclick="addName()">Add</button>
                    </div>
                    <div class="names-list" id="namesList"></div>
                    <button class="tool-button" onclick="spinWheel()">🎯 SPIN THE WHEEL</button>
                    <button class="tool-button clear-btn" onclick="clearWheel()">Clear All</button>
                    <div class="tool-output" id="wheelResult"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let wheelNames = [];
        let isSpinning = false;
        let wheelRotation = 0;
        let centerImage = null;
        const centerImageChoices = [
            'https://raw.githubusercontent.com/ml1cy/Mr.G-Tools/refs/heads/main/mrg.png',
            'https://raw.githubusercontent.com/ml1cy/Mr.G-Tools/refs/heads/main/mrp.png'
        ];

        function loadCenterImage(src) {
            const img = new Image();
            img.onload = function() {
                centerImage = img;
                drawWheel();
            };
            img.onerror = function() {
                if (src !== centerImageChoices[0]) {
                    loadCenterImage(centerImageChoices[0]);
                    return;
                }
                centerImage = null;
                drawWheel();
            };
            img.src = src;
        }

        function setRandomCenterImage() {
            const randomIndex = Math.floor(Math.random() * centerImageChoices.length);
            loadCenterImage(centerImageChoices[randomIndex]);
        }

        // Randomly load one of two center images on page load
        window.onload = function() {
            setRandomCenterImage();
        };

        function addName() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (name && wheelNames.length < 20) {
                wheelNames.push(name);
                input.value = '';
                updateNamesList();
                drawWheel();
            } else if (wheelNames.length >= 20) {
                alert('Maximum 20 names allowed');
            }
        }

        function removeName(index) {
            wheelNames.splice(index, 1);
            updateNamesList();
            drawWheel();
        }

        function updateNamesList() {
            const list = document.getElementById('namesList');
            list.innerHTML = wheelNames.map((name, i) => 
                `<div class="name-tag">${name}<span class="remove-name" onclick="removeName(${i})">×</span></div>`
            ).join('');
        }

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 140;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (wheelNames.length === 0) {
                ctx.fillStyle = '#ddd';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Add names to create wheel', centerX, centerY);
                return;
            }

            const sliceAngle = (2 * Math.PI) / wheelNames.length;
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];

            wheelNames.forEach((name, i) => {
                const startAngle = i * sliceAngle + wheelRotation;
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();

                const textAngle = (startAngle + endAngle) / 2;
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(textAngle);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillText(name, radius - 20, 0);
                ctx.restore();
            });

            // Draw center circle with white background
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw image in center if available
            if (centerImage) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, 45, 0, 2 * Math.PI);
                ctx.clip();
                
                const imgSize = 90;
                ctx.drawImage(centerImage, centerX - imgSize/2, centerY - imgSize/2, imgSize, imgSize);
                ctx.restore();
            } else {
                // Draw default center circle if no image
                ctx.beginPath();
                ctx.arc(centerX, centerY, 15, 0, 2 * Math.PI);
                ctx.fillStyle = '#667eea';
                ctx.fill();
            }

            // Draw pointer
            ctx.fillStyle = '#667eea';
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - radius - 20);
            ctx.lineTo(centerX - 10, centerY - radius - 5);
            ctx.lineTo(centerX + 10, centerY - radius - 5);
            ctx.closePath();
            ctx.fill();
        }

        function spinWheel() {
            if (wheelNames.length < 2 || isSpinning) return;

            // Pick a random center image for each spin
            setRandomCenterImage();
            
            isSpinning = true;
            const spins = 5 + Math.random() * 5;
            const duration = 3000;
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = elapsed / duration;

                if (progress < 1) {
                    wheelRotation += (spins * 2 * Math.PI * progress) / 10;
                    drawWheel();
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    const winnerIndex = Math.floor((wheelNames.length - (wheelRotation / (2 * Math.PI) % wheelNames.length)) % wheelNames.length);
                    document.getElementById('wheelResult').innerHTML = `🎉 <strong>${wheelNames[winnerIndex]}</strong>`;
                }
            }
            animate();
        }

        function clearWheel() {
            wheelNames = [];
            document.getElementById('wheelResult').innerHTML = '';
            updateNamesList();
            drawWheel();
        }

        drawWheel();
    </script>
</body>
</html>
