<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker - Mr.G Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .back-btn { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-bottom: 20px; border: 1px solid white; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .tool-card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 500; }
        input[type="password"], input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em; }
        .tool-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background 0.3s; margin-top: 10px; }
        .tool-button:hover { background: #764ba2; }
        .strength-bar { height: 10px; border-radius: 4px; margin-top: 10px; width: 100%; }
        .strength-weak { background: #ff4444; }
        .strength-fair { background: #ffbb44; }
        .strength-good { background: #99dd55; }
        .strength-strong { background: #44bb44; }
        .strength-text { font-size: 0.9em; font-weight: bold; margin-top: 8px; }
        .strength-output { margin-top: 15px; }
        .criteria { margin-top: 15px; padding: 15px; background: #f5f5f5; border-radius: 5px; border-left: 4px solid #667eea; }
        .criterion { margin: 8px 0; font-size: 0.9em; }
        .criterion.met { color: #44bb44; }
        .criterion.unmet { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← Back to Tools</a>
        <header>
            <h1>💪 Password Strength Checker</h1>
            <p>Analyze password security and strength</p>
        </header>
        
        <div class="tool-card">
            <h2>Password Strength Checker</h2>
            <label>Enter Password:</label>
            <input type="password" id="strengthInput" placeholder="Enter password..." oninput="checkPasswordStrength()">
            <button class="tool-button" onclick="togglePasswordVisibility()">Show/Hide Password</button>
            
            <div class="strength-output" id="strengthOutput"></div>
            <div class="criteria" id="criteria"></div>
        </div>
    </div>

    <script>
        function checkPasswordStrength() {
            const pass = document.getElementById('strengthInput').value;
            if (!pass) {
                document.getElementById('strengthOutput').innerHTML = '';
                document.getElementById('criteria').innerHTML = '';
                return;
            }

            let strength = 0;
            const checks = {
                'At least 8 characters': pass.length >= 8,
                'At least 16 characters': pass.length >= 16,
                'Contains lowercase letters': /[a-z]/.test(pass),
                'Contains uppercase letters': /[A-Z]/.test(pass),
                'Contains numbers': /[0-9]/.test(pass),
                'Contains special characters': /[^a-zA-Z0-9]/.test(pass)
            };

            for (let check in checks) {
                if (checks[check]) strength++;
            }

            let strengthLevel = 'Very Weak';
            let strengthClass = 'strength-weak';
            if (strength >= 5) { strengthLevel = 'Strong'; strengthClass = 'strength-strong'; }
            else if (strength >= 4) { strengthLevel = 'Good'; strengthClass = 'strength-good'; }
            else if (strength >= 3) { strengthLevel = 'Fair'; strengthClass = 'strength-fair'; }

            document.getElementById('strengthOutput').innerHTML = `
                <div class="strength-bar ${strengthClass}"></div>
                <div class="strength-text">Strength: ${strengthLevel} (${strength}/6)</div>
            `;

            let criteriaHTML = '';
            for (let check in checks) {
                const met = checks[check] ? 'met' : 'unmet';
                const icon = checks[check] ? '✓' : '✗';
                criteriaHTML += `<div class="criterion ${met}">${icon} ${check}</div>`;
            }
            document.getElementById('criteria').innerHTML = criteriaHTML;
        }

        function togglePasswordVisibility() {
            const input = document.getElementById('strengthInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
