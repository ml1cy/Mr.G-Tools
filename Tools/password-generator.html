<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - Mr.G Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .back-btn { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-bottom: 20px; border: 1px solid white; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .tool-card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 500; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        input[type="checkbox"] { margin-right: 8px; cursor: pointer; }
        .checkbox-label { display: flex; align-items: center; margin-top: 10px; color: #333; }
        .tool-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background 0.3s; margin-top: 15px; }
        .tool-button:hover { background: #764ba2; }
        .tool-output { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 15px; border-left: 4px solid #667eea; word-break: break-all; font-family: 'Courier New', monospace; font-size: 1.1em; }
        .strength-bar { height: 8px; border-radius: 4px; margin-top: 8px; width: 100%; }
        .strength-weak { background: #ff4444; }
        .strength-fair { background: #ffbb44; }
        .strength-good { background: #99dd55; }
        .strength-strong { background: #44bb44; }
        .strength-text { font-size: 0.85em; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← Back to Tools</a>
        <header>
            <h1>🔑 Password Generator</h1>
            <p>Create strong passwords with custom options</p>
        </header>
        
        <div class="tool-card">
            <h2>Password Generator</h2>
            <label>Password Length:</label>
            <input type="number" id="passLength" value="16" min="8" max="64">
            
            <div class="checkbox-label">
                <input type="checkbox" id="passUppercase" checked>
                <label for="passUppercase">Include Uppercase Letters (A-Z)</label>
            </div>
            <div class="checkbox-label">
                <input type="checkbox" id="passLowercase" checked>
                <label for="passLowercase">Include Lowercase Letters (a-z)</label>
            </div>
            <div class="checkbox-label">
                <input type="checkbox" id="passNumbers" checked>
                <label for="passNumbers">Include Numbers (0-9)</label>
            </div>
            <div class="checkbox-label">
                <input type="checkbox" id="passSymbols" checked>
                <label for="passSymbols">Include Special Symbols</label>
            </div>
            
            <button class="tool-button" onclick="generatePassword()">Generate Password</button>
            <div id="passOutput"></div>
            <div id="strengthIndicator"></div>
        </div>
    </div>

    <script>
        function generatePassword() {
            const length = parseInt(document.getElementById('passLength').value);
            const useUpper = document.getElementById('passUppercase').checked;
            const useLower = document.getElementById('passLowercase').checked;
            const useNum = document.getElementById('passNumbers').checked;
            const useSymbols = document.getElementById('passSymbols').checked;

            let chars = '';
            if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNum) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (!chars) {
                displayOutput('passOutput', '<div style="color: #ff4444;">Select at least one character type</div>');
                return;
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            displayOutput('passOutput', password);
            checkPasswordStrength(password);
        }

        function checkPasswordStrength(password) {
            let strength = 0;

            if (password.length >= 8) strength += 1;
            if (password.length >= 16) strength += 1;
            if (/[a-z]/.test(password)) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 1;

            let strengthLevel = 'Very Weak';
            let strengthClass = 'strength-weak';
            if (strength >= 5) { strengthLevel = 'Strong'; strengthClass = 'strength-strong'; }
            else if (strength >= 4) { strengthLevel = 'Good'; strengthClass = 'strength-good'; }
            else if (strength >= 3) { strengthLevel = 'Fair'; strengthClass = 'strength-fair'; }

            document.getElementById('strengthIndicator').innerHTML = `
                <div class="strength-bar ${strengthClass}"></div>
                <div class="strength-text">Strength: ${strengthLevel} (${strength}/6)</div>
            `;
        }

        function displayOutput(elementId, content) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="tool-output">${content}</div>`;
        }
    </script>
</body>
</html>
