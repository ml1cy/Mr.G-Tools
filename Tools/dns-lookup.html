<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS & Domain Info - Mr.G Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .back-btn { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-bottom: 20px; border: 1px solid white; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .tool-card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        small { color: #666; font-size: 0.85em; }
        .tool-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background 0.3s; margin-top: 10px; }
        .tool-button:hover { background: #764ba2; }
        .tool-output { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 15px; border-left: 4px solid #667eea; }
        .info-item { background: #f9f9f9; padding: 12px; border-radius: 5px; margin: 10px 0; }
        .info-label { font-weight: bold; color: #667eea; font-size: 0.85em; }
        .info-value { margin-top: 5px; font-family: 'Courier New', monospace; }
        .note { color: #666; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← Back to Tools</a>
        <header>
            <h1>🔍 DNS & Domain Info</h1>
            <p>Get domain and DNS information</p>
        </header>
        
        <div class="tool-card">
            <h2>DNS & Domain Info</h2>
            <label>Domain Name:</label>
            <input type="text" id="domainInput" placeholder="example.com">
            <small>Note: Reverse DNS lookups require backend support. Basic info only.</small>
            <button class="tool-button" onclick="getDomainInfo()">Get Domain Info</button>
            <div id="domainOutput"></div>
        </div>
    </div>

    <script>
        function getDomainInfo() {
            const domain = document.getElementById('domainInput').value.trim();
            const output = document.getElementById('domainOutput');

            if (!domain) {
                output.innerHTML = '<div class="tool-output" style="color: #ff4444;">Please enter a domain</div>';
                return;
            }

            output.innerHTML = `
                <div class="tool-output">
                    <div class="info-item">
                        <div class="info-label">Domain</div>
                        <div class="info-value">${domain}</div>
                    </div>
                    <div class="note">
                        <strong>Note:</strong> Full DNS lookups require backend API. For educational purposes, consider using: <br>
                        <br>
                        <strong>Command Line:</strong><br>
                        • <code>nslookup ${domain}</code><br>
                        • <code>dig ${domain}</code><br>
                        • <code>host ${domain}</code><br>
                        <br>
                        <strong>Online Tools:</strong><br>
                        • whatsmydns.net<br>
                        • mxtoolbox.com<br>
                        • centralops.net<br>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
