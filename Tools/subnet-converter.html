<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnet Mask Converter - Mr.G Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .back-btn { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-bottom: 20px; border: 1px solid white; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .tool-card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Courier New', monospace; }
        .tool-button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; transition: background 0.3s; margin-top: 15px; }
        .tool-button:hover { background: #764ba2; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .info-item { background: #f5f5f5; padding: 15px; border-radius: 5px; border-left: 4px solid #667eea; }
        .info-label { font-weight: bold; color: #667eea; font-size: 0.85em; }
        .info-value { font-family: 'Courier New', monospace; margin-top: 8px; color: #333; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← Back to Tools</a>
        <header>
            <h1>🔄 Subnet Mask Converter</h1>
            <p>Convert subnet masks and CIDR notation</p>
        </header>
        
        <div class="tool-card">
            <h2>Subnet Mask Converter</h2>
            <label>Subnet Mask:</label>
            <input type="text" id="subnetMaskInput" placeholder="255.255.255.0">
            <button class="tool-button" onclick="convertSubnetMask()">Convert</button>
            <div id="subnetMaskOutput"></div>
        </div>
    </div>

    <script>
        function convertSubnetMask() {
            const mask = document.getElementById('subnetMaskInput').value;
            const output = document.getElementById('subnetMaskOutput');

            try {
                const parts = mask.split('.').map(Number);
                if (parts.length !== 4 || parts.some(p => p < 0 || p > 255)) throw new Error('Invalid mask');

                let cidr = 0;
                let maskNum = (parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3];
                maskNum = maskNum >>> 0;

                for (let i = 31; i >= 0; i--) {
                    if ((maskNum >> i) & 1) cidr++;
                    else break;
                }

                output.innerHTML = `
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Subnet Mask (Dotted Decimal)</div>
                            <div class="info-value">${mask}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">CIDR Notation</div>
                            <div class="info-value">/${cidr}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Wildcard Mask</div>
                            <div class="info-value">${parts.map(p => 255 - p).join('.')}</div>
                        </div>
                    </div>
                `;
            } catch (e) {
                output.innerHTML = `<div class="info-grid"><div class="info-item error">Invalid subnet mask</div></div>`;
            }
        }
    </script>
</body>
</html>
