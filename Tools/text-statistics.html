<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Statistics - Mr.G Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; padding: 20px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .back-btn { display: inline-block; background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-bottom: 20px; border: 1px solid white; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .tool-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .tool-card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-weight: 500; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Courier New', monospace; resize: vertical; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .info-item { background: #f5f5f5; padding: 15px; border-radius: 5px; border-left: 4px solid #667eea; }
        .info-label { font-weight: bold; color: #667eea; font-size: 0.85em; }
        .info-value { font-family: 'Courier New', monospace; margin-top: 8px; font-size: 1.5em; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← Back to Tools</a>
        <header>
            <h1>📊 Text Statistics</h1>
            <p>Analyze text for characters, words, and lines</p>
        </header>
        
        <div class="tool-card">
            <h2>Text Statistics</h2>
            <label>Enter Text:</label>
            <textarea id="textStatsInput" placeholder="Enter text..." rows="6" oninput="calculateTextStats()"></textarea>
            <div id="textStatsOutput"></div>
        </div>
    </div>

    <script>
        function calculateTextStats() {
            const text = document.getElementById('textStatsInput').value;
            const output = document.getElementById('textStatsOutput');

            const chars = text.length;
            const charsNoSpace = text.replace(/\s/g, '').length;
            const words = text.trim().split(/\s+/).filter(w => w).length;
            const lines = text.split('\n').filter(l => l.trim()).length;

            output.innerHTML = `
                <div class="stats-grid">
                    <div class="info-item">
                        <div class="info-label">Total Characters</div>
                        <div class="info-value">${chars}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Characters (No Space)</div>
                        <div class="info-value">${charsNoSpace}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Words</div>
                        <div class="info-value">${words}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Lines</div>
                        <div class="info-value">${lines}</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
